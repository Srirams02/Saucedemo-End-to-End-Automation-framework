name: Run Automation Tests

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 10 * * *'   # daily run

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # ✅ Checkout code
      - name: Checkout Code
        uses: actions/checkout@v3

      # ✅ Setup Java
      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      # ✅ Cache Maven dependencies (faster builds)
      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      # ✅ Install dependencies
      - name: Install Dependencies
        run: mvn clean install -DskipTests

      # 🔥 IMPORTANT — Run tests in CI mode
      - name: Run Tests
        run: mvn test -Denv=ci

      # ✅ Upload Allure raw results
      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      # 🔥 OPTIONAL (NEXT STEP) — Generate Allure Report UI
      - name: Generate Allure Report
        if: always()
        run: mvn io.qameta.allure:allure-maven:report

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin
