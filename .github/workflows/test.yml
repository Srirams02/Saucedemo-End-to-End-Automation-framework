name: Run Automation Tests

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: '0 10 * * *'   # 3:30 PM IST

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Cache Maven packages
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Install Dependencies
        run: mvn clean install -DskipTests

      - name: Run Tests
        run: mvn test -Denv=ci

      - name: Upload Allure Results
        uses: actions/upload-artifact@v4
        with:
          name: allure-results
          path: target/allure-results

      - name: Generate Allure Report
        if: always()
        run: mvn io.qameta.allure:allure-maven:report

      - name: Upload Allure HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: target/site/allure-maven-plugin

      - name: Extract Test Summary
        if: always()
        run: |
          PASSED=$(grep -r '"status":"passed"' target/allure-results | wc -l)
          FAILED=$(grep -r '"status":"failed"' target/allure-results | wc -l)
          BROKEN=$(grep -r '"status":"broken"' target/allure-results | wc -l)
          TOTAL=$((PASSED + FAILED + BROKEN))

          echo "PASSED=$PASSED" >> $GITHUB_ENV
          echo "FAILED=$FAILED" >> $GITHUB_ENV
          echo "BROKEN=$BROKEN" >> $GITHUB_ENV
          echo "TOTAL=$TOTAL" >> $GITHUB_ENV

      - name: Send HTML Email Report
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL_USERNAME }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: "Saucedemo Automation Report - Run #${{ github.run_number }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.EMAIL_USERNAME }}
          html_body: |
            <h2>Saucedemo Automation Test Report</h2>

            <p><b>Total Tests:</b> ${{ env.TOTAL }}</p>
            <p>✅ Passed: ${{ env.PASSED }}</p>
            <p>❌ Failed: ${{ env.FAILED }}</p>
            <p>⚠️ Broken: ${{ env.BROKEN }}</p>

            <h3>Test Result Chart</h3>
            <img src="https://quickchart.io/chart?c={
              type:'pie',
              data:{
                labels:['Passed','Failed','Broken'],
                datasets:[{
                  data:[${{ env.PASSED }},${{ env.FAILED }},${{ env.BROKEN }}]
                }]
              }
            }" />

            <h3>View Full Report</h3>
            <a href="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}">
              Open Allure Report
            </a>

            <br><br>
            <p><i>Triggered via GitHub Actions CI/CD pipeline</i></p>
